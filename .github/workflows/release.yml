name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish to npm
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  npm:
    if: startsWith(github.event.release.tag_name || inputs.tag, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run check
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: node -e "const p=require('./package.json');if(process.env.RELEASE_TAG!=='v'+p.version){console.error('Release tag must equal v'+p.version);process.exit(1)}"
      - run: npm pack --dry-run --json
      - name: Check whether this exact commit is already published
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          local_head=$(git rev-parse HEAD)
          if published_head=$(npm view "${package_name}@${package_version}" gitHead --silent 2>/dev/null); then
            if [ -z "${published_head}" ] || [ "${published_head}" != "${local_head}" ]; then
              echo "Registry version exists but its gitHead does not match ${local_head}." >&2
              exit 1
            fi
            echo "already_published=true" >> "${GITHUB_OUTPUT}"
            echo "Registry already contains this exact commit; skipping a duplicate publish."
          else
            echo "already_published=false" >> "${GITHUB_OUTPUT}"
          fi
      # npm exchanges the GitHub OIDC token for a short-lived publishing
      # credential. No NODE_AUTH_TOKEN is stored; provenance is automatic.
      - if: steps.registry.outputs.already_published != 'true'
        run: npm publish
