name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  npm:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run check
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node -e "const p=require('./package.json');if(process.env.RELEASE_TAG!=='v'+p.version){console.error('Release tag must equal v'+p.version);process.exit(1)}"
      - run: npm pack --dry-run --json
      # npm exchanges the GitHub OIDC token for a short-lived publishing
      # credential. No NODE_AUTH_TOKEN is stored; provenance is automatic.
      - run: npm publish
